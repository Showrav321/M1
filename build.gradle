plugins {
    id 'fabric-loom' version '1.7.4' 
}

repositories {
    maven { url = "https://maven.fabricmc.net/" }
    mavenCentral()
}

dependencies {
    minecraft "com.mojang:minecraft:26.1.2"
    mappings "net.fabricmc:yarn:26.1.2+build.1:v2"
    modImplementation "net.fabricmc:fabric-loader:0.15.11"
}
