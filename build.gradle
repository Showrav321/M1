plugins {
    id 'fabric-loom' version '1.16-SNAPSHOT'
}

dependencies {
    minecraft "com.mojang:minecraft:1.26"
    // Using intermediary mappings instead of Yarn to bypass the 'not found' error
    mappings "net.fabricmc:intermediary:1.26"
    modImplementation "net.fabricmc:fabric-loader:0.15.11"
}
